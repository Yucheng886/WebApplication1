    <script>
        // ======== 粒子动画 ========
        (function () {
            const canvas = document.getElementById('particleCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animId;
            let w, h;

            function resize() {
                w = canvas.width = canvas.offsetWidth;
                h = canvas.height = canvas.offsetHeight;
            }

            function createParticle() {
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 2 + 0.5,
                    dx: (Math.random() - 0.5) * 0.3,
                    dy: (Math.random() - 0.5) * 0.3,
                    alpha: Math.random() * 0.6 + 0.1,
                    alphaDir: Math.random() > 0.5 ? 0.003 : -0.003,
                    hue: Math.random() > 0.7 ? 200 : 180 // 蓝或青
                };
            }

            function init() {
                resize();
                particles = [];
                const count = Math.min(Math.floor(w * h / 6000), 200);
                for (let i = 0; i < count; i++) {
                    particles.push(createParticle());
                }
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    // 呼吸闪烁
                    p.alpha += p.alphaDir;
                    if (p.alpha >= 0.7 || p.alpha <= 0.05) p.alphaDir *= -1;

                    // 移动
                    p.x += p.dx;
                    p.y += p.dy;
                    if (p.x < 0) p.x = w;
                    if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h;
                    if (p.y > h) p.y = 0;

                    // 绘制发光粒子
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.alpha})`;
                    ctx.fill();

                    // 外发光
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.alpha * 0.15})`;
                    ctx.fill();
                });

                // 连线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.08 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                animId = requestAnimationFrame(draw);
            }

            init();
            draw();
            window.addEventListener('resize', init);

            // 按钮点击：淡出欢迎页
            document.getElementById('enterMapBtn').addEventListener('click', function () {
                const overlay = document.getElementById('welcomeOverlay');
                overlay.classList.add('fade-out');

                // 动画结束后移除 DOM 并停止粒子动画
                setTimeout(function () {
                    cancelAnimationFrame(animId);
                    overlay.remove();
                }, 1300);
            });
        })();
    </script>

    <script>
        // 初始化应用
        let viewer;

        // 诗人路线颜色映射（颜色不存数据库，在前端维护）
        const POET_COLORS = {
            '苏轼': Cesium.Color.YELLOW,
            '刘禹锡': Cesium.Color.CYAN,
            '李白': Cesium.Color.ORANGE,
            '杜甫': Cesium.Color.GREEN,
            '白居易': Cesium.Color.MAGENTA,
            '王维': Cesium.Color.PURPLE
        };

        /**
         * 从后端加载城市和路线数据，赋值给全局变量
         */
        async function loadDataFromAPI() {
            try {
                // 并行请求城市数据和路线数据
                const [citiesRes, routesRes] = await Promise.all([
                    fetch('PoemApiHandler.ashx?type=cities'),
                    fetch('PoemApiHandler.ashx?type=routes')
                ]);

                // 处理城市数据
                const citiesJson = await citiesRes.json();
                window.poetryData = citiesJson.map(c => ({
                    name: c.name,
                    lat: c.lat,
                    lon: c.lon,
                    count: c.count,
                    yearData: c.yearData || {}
                }));

                // 定义 getCountByYear 工具函数
                window.getCountByYear = function (yearData, targetYear) {
                    if (!yearData) return 0;
                    const years = Object.keys(yearData).map(Number).sort((a, b) => a - b);
                    let result = 0;
                    for (let i = 0; i < years.length; i++) {
                        if (years[i] <= targetYear) {
                            result = yearData[years[i]];
                        } else {
                            break;
                        }
                    }
                    return result;
                };

                // 处理路线数据：附加 Cesium 颜色
                const routesJson = await routesRes.json();
                window.allRoutes = routesJson.map(r => ({
                    name: r.name,
                    path: r.path,
                    color: POET_COLORS[r.name] || Cesium.Color.WHITE
                }));

                console.log(`[DataAPI] 已加载 ${window.poetryData.length} 个城市, ${window.allRoutes.length} 条路线`);
            } catch (err) {
                console.error('[DataAPI] 数据加载失败:', err);
                // 回退：使用空数组避免页面崩溃
                window.poetryData = window.poetryData || [];
                window.allRoutes = window.allRoutes || [];
            }
        }

        $(document).ready(async function () {
            // 初始化地图
            viewer = MapManager.init('cesiumContainer');

            // 从 API 加载数据
            await loadDataFromAPI();

            // 初始化 UI
            UIManager.init();
            TimelineManager.init(viewer);
            TimelineIntegration.init(viewer);

            // 启动时间更新
            setInterval(updateTime, 1000);
            updateTime();

            // 诗词数据
            const poetryData = window.poetryData;

            // 路线配置数组
            const allRoutes = window.allRoutes;

            // 路线选择状态
            let selectedRoutes = {};

            // 初始化路线选择状态（默认都不选中）
            allRoutes.forEach(route => {
                selectedRoutes[route.name] = false;
            });

            // 生成路线选择面板内容
            function generateRouteSelectPanel() {
                const content = document.getElementById('routeSelectContent');
                content.innerHTML = '';

                allRoutes.forEach(route => {
                    const routeItem = document.createElement('div');
                    routeItem.className = 'route-select-item';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `route_${route.name}`;
                    checkbox.value = route.name;
                    checkbox.checked = selectedRoutes[route.name] || false;
                    checkbox.addEventListener('change', function () {
                        selectedRoutes[route.name] = this.checked;
                    });

                    const label = document.createElement('label');
                    label.htmlFor = `route_${route.name}`;
                    label.className = 'route-select-label';

                    const colorDot = document.createElement('span');
                    colorDot.className = 'route-color-dot';
                    colorDot.style.backgroundColor = route.color.toCssColorString();

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = route.name;
                    nameSpan.className = 'route-name';

                    label.appendChild(colorDot);
                    label.appendChild(nameSpan);

                    routeItem.appendChild(checkbox);
                    routeItem.appendChild(label);

                    content.appendChild(routeItem);
                });
            }

            // 切换路线选择面板展开/收起
            function toggleRouteSelectPanel() {
                const panel = document.getElementById('routeSelectPanel');
                if (panel.classList.contains('expanded')) {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                } else {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    generateRouteSelectPanel();
                }
            }

            // 显示路线选择面板（展开）
            function showRouteSelectPanel() {
                const panel = document.getElementById('routeSelectPanel');
                panel.classList.remove('collapsed');
                panel.classList.add('expanded');
                generateRouteSelectPanel();
            }

            // 隐藏路线选择面板（收起）
            function hideRouteSelectPanel() {
                const panel = document.getElementById('routeSelectPanel');
                panel.classList.remove('expanded');
                panel.classList.add('collapsed');
            }

            // 路线按钮点击事件
            const btnRoute = document.getElementById('btnRoute');
            const routeSelectPanel = document.getElementById('routeSelectPanel');
            const routeSelectToggle = document.getElementById('routeSelectToggle');
            const routePanelCloseBtn = document.getElementById('routePanelCloseBtn');
            const routeSelectConfirm = document.getElementById('routeSelectConfirm');
            const routeSelectAll = document.getElementById('routeSelectAll');
            const routeSelectNone = document.getElementById('routeSelectNone');

            // 初始化面板状态为收起
            routeSelectPanel.classList.add('collapsed');

            // 监听 UI Manager 请求生成面板内容的事件
            document.addEventListener('RequestGenerateRoutePanel', () => {
                generateRouteSelectPanel();
            });

            // 确认选择
            routeSelectConfirm.addEventListener('click', () => {
                // 检查是否有选中的路线
                const hasSelected = Object.values(selectedRoutes).some(selected => selected);

                if (hasSelected) {
                    btnRoute.classList.add('active');
                    showRoutes();
                } else {
                    btnRoute.classList.remove('active');

                }

                // 确认后自动收起面板
                hideRouteSelectPanel();
            });

            routeSelectAll.addEventListener('click', () => {
                allRoutes.forEach(route => {
                    selectedRoutes[route.name] = true;
                });
                generateRouteSelectPanel();
            });

            // 全不选
            routeSelectNone.addEventListener('click', () => {

            // 隐藏路线函数
            function hideRoutes() {
                try {
                    if (!routeEntities) {
                        routeEntities = [];
                        return;
                    }

                    routeEntities.forEach(entity => {
                        if (entity instanceof Cesium.ScreenSpaceEventHandler) {
                            entity.destroy();
                        } else if (entity && viewer.entities.contains(entity)) {
                            viewer.entities.remove(entity);
                        }
                    });

                    routeEntities.length = 0;
                } catch (error) {
                    console.error('隐藏路线时出错:', error);
                }
            }

            // 修改显示路线函数 - 只显示选中的诗人路线
            function showRoutes() {
                try {
                    // 先清除现有路线
                    hideRoutes();

                    // 获取选中的路线
                    const selectedRouteNames = Object.keys(selectedRoutes).filter(name => selectedRoutes[name]);

                    if (selectedRouteNames.length === 0) {
                        return; // 没有选中的路线，直接返回
                    }

                    // 创建事件处理器
                    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

                    // 收集所有地点用于点击事件
                    const allPoints = [];

                    // 只显示选中的路线
                    allRoutes.forEach(route => {
                        if (selectedRoutes[route.name]) {
                            // 显示路线
                            const routeLine = viewer.entities.add({
                                polyline: {
                                    positions: Cesium.Cartesian3.fromDegreesArray(
                                        route.path.reduce((arr, point) => [...arr, point.location[0], point.location[1]], [])
                                    ),
                                    width: 4,
                                    material: new Cesium.PolylineGlowMaterialProperty({
                                        glowPower: 0.25,
                                        color: route.color.withAlpha(0.75)
                                    }),
                                    clampToGround: true
                                },
                                name: route.name + '路线'
                            });
                            routeEntities.push(routeLine);

                            // 添加该路线的所有地点
                            route.path.forEach(point => {
                                allPoints.push(point);
                            });
                        }
                    });

                    // 添加所有点位标记
                    allPoints.forEach(point => {
                        const pointEntity = viewer.entities.add({
                            position: Cesium.Cartesian3.fromDegrees(point.location[0], point.location[1]),
                            point: {
                                pixelSize: 10,
                                color: Cesium.Color.WHITE,
                                outlineColor: Cesium.Color.BLACK,
                                outlineWidth: 2,
                                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                            },
                            label: {
                                text: point.name,
                                font: '13px sans-serif',
                                fillColor: Cesium.Color.WHITE,
                                outlineColor: Cesium.Color.BLACK,
                                outlineWidth: 2,
                                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                                pixelOffset: new Cesium.Cartesian2(0, -10),
                                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                                scale: 0.9
                            },
                            description: point.name
                        });

                        // 显式挂载原始数据以供点击穿透使用
                        pointEntity.routePointData = point;

                        routeEntities.push(pointEntity);
                    });

                    // 添加点击事件处理
                    handler.setInputAction(function (click) {
                        const pickedFeature = viewer.scene.pick(click.position);
                        if (Cesium.defined(pickedFeature)) {
                            const entity = pickedFeature.id;
                            if (entity && entity.routePointData) {
                                // 保证调用全局的 showLocationPoems，以免局部作用域不一致
                                if (typeof window.showLocationPoems === 'function') {
                                    window.showLocationPoems(entity.routePointData);
                                } else {
                                    showLocationPoems(entity.routePointData);
                                }
                            }
                        }
                    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);


                    // 将事件处理器添加到routeEntities以便清理
                    routeEntities.push(handler);

                    console.log(`已显示 ${allRoutes.length} 条诗人路线`);

                } catch (error) {
                    console.error('显示路线时出错:', error);
                }

                        button.classList.remove('active');

                data: {
                    type: window.currentSearchData.type,
                    [window.currentSearchData.type === 'search' ? 'keyword' : window.currentSearchData.type]: window.currentSearchData.keyword,
                    page: window.currentSearchData.page,
                    size: window.currentSearchData.size
                },
                dataType: "json",
                success: function (data) {
                    try {
                        const panelContent = document.getElementById('poemPanelContent');
                        const panelFooter = document.getElementById('poemPanelFooter');
                        if (!panelContent) return;

                        if (data.error) {
                            panelContent.innerHTML = `<div style="color:red; margin:10px;">${data.error}</div>`;
                            return;
                        }

                        let items = data.items || data;

                        if (!items || items.length === 0) {
                            if (isFirstPage) {
                                panelContent.innerHTML = '<div style="color:#aaa; text-align:center; margin-top:20px;">未找到结果</div>';
                                if (panelFooter) panelFooter.style.display = 'none';
                            }
                            return;
                        }

                        if (isFirstPage) {
                            panelContent.innerHTML = '';
                        }

                        displayPoemsInPanel(items);

                        if (items.length < window.currentSearchData.size) {
                            if (panelFooter) panelFooter.style.display = 'none';
                        } else {
                            if (panelFooter) panelFooter.style.display = 'block';
                        }

                        if (isFirstPage && window.currentSearchData.type === 'city') {
                            const city = window.poetryData && window.poetryData.find(p => p.name === window.currentSearchData.keyword);
                            if (city && typeof viewer !== 'undefined') {
                                viewer.camera.flyTo({
                                    destination: Cesium.Cartesian3.fromDegrees(city.lon, city.lat, 100000.0),
                                    duration: 2.0
                                });
                            }
                        }
                    } catch (e) {
                        console.error(e);
                    }
                },
                error: function () {
                    const panelContent = document.getElementById('poemPanelContent');
                    if (panelContent) panelContent.innerHTML = '<div style="color:red; margin:10px;">加载失败，请检查网络</div>';
                }
            });
        }

        window.openPoemPanel = function (title) {
            const panel = document.getElementById('poemSidePanel');
            if (panel) {
                panel.style.display = 'flex';
                panel.style.flexDirection = 'column';
                document.getElementById('poemPanelTitle').innerText = title || "古诗词";
            }
        }

        window.displayPoemsInPanel = function (poems) {
            const container = document.getElementById('poemPanelContent');
            if (!container) return;

            poems.forEach(poem => {
                const el = document.createElement('div');
                el.className = 'poem-item';
                el.style.cursor = 'pointer';
                el.style.padding = '15px';
                el.style.marginBottom = '15px';
                el.style.background = 'linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%)';
                el.style.border = '1px solid rgba(0, 255, 255, 0.2)';
                el.style.borderRadius = '8px';
                el.style.transition = 'all 0.3s ease';

                el.onmouseover = function () {
                    this.style.background = 'linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(0, 200, 255, 0.05) 100%)';
                    this.style.transform = 'translateY(-2px)';
                };
                el.onmouseout = function () {
                    this.style.background = 'linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%)';
                    this.style.transform = 'translateY(0)';
                };

                el.innerHTML = `
                        <div class="poem-title" style="color:#00ffff; font-size:16px; margin-bottom:8px; font-weight:bold;">${poem.title || poem.Title} ${(poem.subTitle || poem.SubTitle) ? '<span style="font-size:12px; color:rgba(0,255,255,0.7);">· ' + (poem.subTitle || poem.SubTitle) + '</span>' : ''}</div>
                        <div class="poem-info" style="font-size:13px; color:rgba(255,255,255,0.8);">
                            <span class="dynasty">${poem.dynasty || poem.Dynasty || '未知朝代'}</span> · 
                            <span class="author" style="color: #66ffff;">${poem.author || poem.Author || '佚名'}</span>
                        </div>
                    `;

                el.addEventListener('click', () => {
                    const contentText = poem.content || poem.Content || '';
                    showPoemDetailDialog(poem.title || poem.Title, poem.author || poem.Author, contentText);
                });

                container.appendChild(el);
            });
        }

        window.showPoemDetailDialog = function (title, author, content) {
            const contentHtml = content.split('。').join('。<br>');
            const detailPanel = document.createElement('div');
            detailPanel.className = 'poem-detail-panel';
            detailPanel.style.position = 'fixed';
            detailPanel.style.top = '50%';
            detailPanel.style.left = '50%';
            detailPanel.style.transform = 'translate(-50%, -50%)';
            detailPanel.style.background = 'rgba(0, 20, 35, 0.95)';
            detailPanel.style.backdropFilter = 'blur(12px)';
            detailPanel.style.padding = '30px';
            detailPanel.style.borderRadius = '16px';
            detailPanel.style.border = '1px solid rgba(0, 255, 255, 0.3)';
            detailPanel.style.boxShadow = '0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.2)';
            detailPanel.style.zIndex = '999999';
            detailPanel.style.width = '80%';
            detailPanel.style.maxWidth = '600px';
            detailPanel.style.maxHeight = '80vh';
            detailPanel.style.display = 'flex';
            detailPanel.style.flexDirection = 'column';

            detailPanel.innerHTML = `
                <div class="poem-detail-content" style="flex:1; overflow-y:auto; padding-right:10px;">
                    <h2 style="color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.4); border-bottom:1px solid rgba(0,255,255,0.2); padding-bottom:10px; margin-top:0;">${title}</h2>
                    <h3 style="color: #e0faff; font-weight: normal; margin-bottom: 20px;">作者：${author}</h3>
                    <p style="line-height:2.0; color:#fff; font-size:16px;">${contentHtml}</p>
                </div>
                <div class="button-group" style="text-align:right; border-top:1px solid rgba(0,255,255,0.2); padding-top:15px; margin-top:20px;">
                    <button class="save-detail-btn" style="background:#00ffff; color:#000; border:none; padding:8px 20px; border-radius:4px; font-weight:bold; cursor:pointer; margin-right:15px;">保存文本</button>
                    <button class="close-detail-btn" style="background:transparent; border:1px solid #00ffff; color:#00ffff; padding:8px 20px; border-radius:4px; cursor:pointer;">关闭</button>
                </div>
                `;
            document.body.appendChild(detailPanel);

            detailPanel.querySelector('.close-detail-btn').addEventListener('click', () => detailPanel.remove());

            const btnSave = detailPanel.querySelector('.save-detail-btn');
            if (btnSave) {
                btnSave.addEventListener('click', async () => {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: title,
                            types: [{ description: '文本文件', accept: { 'text/plain': ['.txt'] } }]
                        });
                        const writable = await handle.createWritable();
                        const txt = ['='.repeat(50), title, '='.repeat(50), '', '作者：' + author, '', '-'.repeat(50), content, '-'.repeat(50), '', '保存时间：' + new Date().toLocaleString()].join('\n');
                        await writable.write(txt);
                        await writable.close();
                        // showToast('保存成功');
                        alert('保存成功');
                    } catch (e) { }
                });
            }
        }

        // 路由/城市入口复写
        window.showLocationPoems = function (point) {
            // 判断是否是线路节点（如果是对象本身带有 poems 属性）
            if (point.hasOwnProperty('poems')) {
                openPoemPanel(`路线节点：${point.name}`);
                const panelContent = document.getElementById('poemPanelContent');
                if (panelContent) {
                    if (point.poems.length === 0) {
                        panelContent.innerHTML = '<div style="text-align:center; padding:20px; color:#aaa;">该节点暂未匹配到直接相关联的诗词。</div>';
                    } else {
                        panelContent.innerHTML = '';
                        displayPoemsInPanel(point.poems);
                    }
                }
                const footer = document.getElementById('poemPanelFooter');
                if (footer) footer.style.display = 'none'; // 路线节点的诗词为全部固定内容，不翻页
                return;
            }

            // 否则当作城市热点
            openPoemPanel(`城市：${point.name}`);
            const panelCon = document.getElementById('poemPanelContent');
            if (panelCon) panelCon.innerHTML = '<div style="text-align:center; padding:20px;">正在加载数据...</div>';

            window.currentSearchData = {
                type: 'city',
                keyword: point.name,
                page: 1,
                size: 15
            };

            loadPoemData(true);
        };

        // 只要 JS 执行到这，确保绑定挂载：
        setTimeout(() => {
            const btnSearch = document.getElementById('searchBtn');
            if (btnSearch) {
                // 清除可能旧的绑定
                const nwBtn = btnSearch.cloneNode(true);
                btnSearch.parentNode.replaceChild(nwBtn, btnSearch);
                nwBtn.addEventListener('click', window.searchPoetry);
            }
            const inputArea = document.getElementById('citySearch');
            if (inputArea) {
                inputArea.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') window.searchPoetry();
                });
            }
            const btnClose = document.getElementById('closePoemPanelBtn');
            if (btnClose) btnClose.addEventListener('click', () => document.getElementById('poemSidePanel').style.display = 'none');

            const btnLoad = document.getElementById('loadMorePoemsBtn');
            if (btnLoad) {
                btnLoad.addEventListener('click', () => {
                    if (window.currentSearchData) {
                        window.currentSearchData.page += 1;
                        loadPoemData(false);
                    }
                });
            }
        }, 1000);
    </script>

    <script>
        // Heatmap rendering logic
        $(document).ready(function () {
            let heatmapInstance = null;
            let heatmapData = [];
            let heatmapEnabled = true;

            const container = document.getElementById('heatmapContainer');
            if (container) {
                heatmapInstance = h337.create({
                    container: container,
                    radius: 30,
                    maxOpacity: 0.8,
                    minOpacity: 0.1,
                    blur: .75,
                    gradient: {
                        '.1': 'blue',
                        '.5': 'yellow',
                        '.8': 'red',
                        '1': 'white'
                    }
                });
            }

            function toggleHeatmap() {
                heatmapEnabled = !heatmapEnabled;
                const container = document.getElementById('heatmapContainer');
                if (heatmapEnabled) {
                    document.getElementById('btnHeatmap').classList.add('active');
                    if (container) container.style.opacity = '1';
                    updateHeatmap();
                } else {
                    document.getElementById('btnHeatmap').classList.remove('active');
                    if (container) container.style.opacity = '0';
                    if (heatmapInstance) {
                        heatmapInstance.setData({ max: 0, data: [] });
                    }
                }
            }

            const btn = document.getElementById('btnHeatmap');
            if (btn) btn.addEventListener('click', toggleHeatmap);

            function updateHeatmap() {
                if (!heatmapEnabled || !heatmapInstance || !window.poetryData) return;

                const points = [];
                let max = 0;

                window.poetryData.forEach(city => {
                    // Use total count or current filter
                    let cnt = city.count || 0;
                    if (cnt > 0) {
                        max = Math.max(max, cnt);
                        const position = Cesium.Cartesian3.fromDegrees(city.lon, city.lat);
                        const canvasPos = viewer.scene.cartesianToCanvasCoordinates(position);
                        if (canvasPos) {
                            points.push({
                                x: Math.floor(canvasPos.x),
                                y: Math.floor(canvasPos.y),
                                value: cnt
                            });
                        }
                    }
                });

                heatmapInstance.setData({
                    max: max * 0.8,
                    data: points
                });
            }

            // Bind to map events
            if (typeof viewer !== "undefined" && viewer.camera) {
                viewer.camera.changed.addEventListener(function () {
                    if (heatmapEnabled) updateHeatmap();
                });
            }

            window.addEventListener('resize', function () {
                if (heatmapEnabled) setTimeout(updateHeatmap, 200);
            });

            // Listen to timeline filtering
            document.addEventListener('heatmapYearFilter', function (e) {
                if (!heatmapEnabled || !heatmapInstance) return;
                const year = e.detail.year;
                const points = [];
                let max = 0;

                window.poetryData.forEach(city => {
                    let cnt = window.getCountByYear ? window.getCountByYear(city.yearData, year) : city.count;
                    if (cnt > 0) {
                        max = Math.max(max, cnt);
                        const pos = Cesium.Cartesian3.fromDegrees(city.lon, city.lat);
                        const canvasPos = viewer.scene.cartesianToCanvasCoordinates(pos);
                        if (canvasPos && canvasPos.x > 0 && canvasPos.y > 0) {
                            points.push({
                                x: Math.floor(canvasPos.x),
                                y: Math.floor(canvasPos.y),
                                value: cnt
                            });
                        }
                    }
                });

                heatmapInstance.setData({ max: max * 0.8, data: points });
            });

            // Initial Draw
            const hc = document.getElementById('heatmapContainer');
            if (hc) hc.style.opacity = '1';
            setTimeout(updateHeatmap, 1000);
        });
    </script>
